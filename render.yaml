# Render Blueprint — push this repo to GitHub, then click
# "New +" → "Blueprint" in the Render dashboard and point it at the repo.
# Render reads this file and provisions everything.
services:
  - type: web
    name: propertycheck
    runtime: node
    plan: starter # $7/mo, always-on, 512MB. Bump to "standard" ($25, 2GB) if PDFs OOM.
    region: frankfurt # closest to UK; switch to oregon/ohio/singapore if your users are elsewhere
    # Build explicitly installs Chrome to the PERSISTENT cache dir
    # (/opt/render/project/.cache survives between deploys; /opt/render/.cache
    # does NOT). The third "npm rebuild" step is a no-op safety net.
    buildCommand: npm install && npx puppeteer browsers install chrome && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "false"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      # ---- secrets (fill in from the Render dashboard, not here) ----
      - key: NEXT_PUBLIC_AZURE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_AZURE_AUTHORITY
        value: https://login.microsoftonline.com/common
      - key: NEXT_PUBLIC_AZURE_REDIRECT_URI
        sync: false # set this to https://propertycheck.onrender.com after first deploy
      - key: GEMINI_API_KEY
        sync: false
      # Optional Gemini model overrides. Leave unset in dashboard to use
      # the defaults (gemini-3.5-flash, gemini-3.5-pro).
      - key: GEMINI_FLASH_MODEL
        sync: false
      - key: GEMINI_PRO_MODEL
        sync: false
      # Founder/admin emails that bypass the paywall (comma-separated).
      # Set this in the Render dashboard to your own email so you always
      # have access. Leave blank to enforce paywall on everyone.
      - key: ADMIN_EMAILS
        sync: false
